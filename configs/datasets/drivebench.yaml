# DriveBench curation config (clean split, MCQ first).
# Point qa_file/data_root at your downloaded DriveBench release.
dataset: drivebench
qa_file: data/raw/drivebench/drivebench.json
data_root: data/raw/drivebench
split: clean          # 'clean' | a corruption name | 'all'
formats: [mcq]        # add qa / cap once MCQ calibration is validated
per_task: 100         # balance perception/prediction/planning/behavior
out: data/curated/drive_v1.jsonl
